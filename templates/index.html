<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELYPTIA | ULTRON COMMAND CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-dark: #006b70;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(0, 242, 255, 0.2);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Animated Background */
        .grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            opacity: 0.15;
            z-index: -1;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
            backdrop-filter: blur(5px);
        }

        /* Sidebar - Agents List */
        .sidebar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .agent-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .agent-card:hover, .agent-card.active {
            border-color: var(--accent);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .agent-info { font-size: 11px; color: #888; margin-top: 5px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            background: #555;
        }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
        }

        /* Header / Stats */
        .stats-bar {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 12px;
            flex: 1;
        }

        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; margin-top: 5px; }

        /* Terminal Window */
        .terminal-container {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--border);
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: rgba(0, 242, 255, 0.1);
            padding: 10px 15px;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        #terminal-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        .response-block {
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Input Area */
        .input-bar {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent);
            transform: scale(1.02);
        }

        /* Player Heads Extraction Styling */
        .player-head {
            width: 32px; height: 32px;
            image-rendering: pixelated;
            vertical-align: middle;
            margin-right: 10px;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    
    <div class="app-container">
        <!-- Dashboard Sidebar -->
        <div class="sidebar">
            <div style="text-align: center; margin-bottom: 20px;">
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--accent);">ELYPTIA</h1>
                <div style="font-size: 10px; opacity: 0.5;">CYBER COMMAND V3.0</div>
            </div>
            
            <h2>Tactical Agents</h2>
            <div id="agent-list">
                <!-- Agents will be injected here -->
            </div>
        </div>

        <!-- Main Interface -->
        <div class="main-content">
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="stat-label">Active Connections</div>
                    <div id="active-count" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Server Status</div>
                    <div class="stat-value" style="color: #00ff88;">OPERATIONAL</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Global Latency</div>
                    <div class="stat-value">12ms</div>
                </div>
            </div>

            <div class="terminal-container">
                <div class="terminal-header">
                    <span>SYSTEM_LOGS.EXE</span>
                    <span id="current-agent-status">NO AGENT SELECTED</span>
                </div>
                <div id="terminal-output">
                    <div class="response-block" style="border-left-color: #555;">
                        > Welcome to Elyptia Ultron System Control.<br>
                        > Select an agent to begin tactical operations or enter a Target IP.
                    </div>
                </div>
            </div>

            <div class="input-bar">
                <span>></span>
                <input type="text" id="command-input" placeholder="Enter Target IP or System Command..." autocomplete="off">
                <button onclick="sendCommand()">EXECUTE</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedAgent = 'all';

        socket.on('update_dashboard', (agents) => {
            const list = document.getElementById('agent-list');
            const count = document.getElementById('active-count');
            list.innerHTML = '';
            
            let i = 0;
            for (const id in agents) {
                i++;
                const agent = agents[id];
                const div = document.createElement('div');
                div.className = `agent-card ${selectedAgent === id ? 'active' : ''}`;
                div.onclick = () => {
                    selectedAgent = id;
                    document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                    document.getElementById('current-agent-status').innerText = `TARGETING: ${id}`;
                };
                
                div.innerHTML = `
                    <div><span class="status-dot online"></span> ${id}</div>
                    <div class="agent-info">${agent.hostname} | ${agent.ip}</div>
                `;
                list.appendChild(div);
            }
            count.innerText = i;
        });

        socket.on('display_response', (data) => {
            const output = document.getElementById('terminal-output');
            const block = document.createElement('div');
            block.className = 'response-block';
            
            // Formatage intelligent pour les joueurs Minecraft (Minotar)
            let formattedOutput = data.output.replace(/ID: (.*?) \| UUID: (.*?)\n/g, (match, name, uuid) => {
                return `<div><img src="https://minotar.net/avatar/${name}/32" class="player-head"> <b>${name}</b> <span style="font-size:10px; opacity:0.5;">(${uuid})</span></div>`;
            });

            block.innerHTML = `
                <div style="font-size: 10px; color: var(--accent); margin-bottom: 5px;">[${data.time}] RESPONSE FROM ${data.id}:</div>
                <div style="white-space: pre-wrap;">${formattedOutput}</div>
            `;
            output.appendChild(block);
            output.scrollTop = output.scrollHeight;
            
            // Effect sonore ou flash ? (Optionnel)
            gsap.from(block, { duration: 0.5, x: -20, opacity: 0 });
        });

        function sendCommand() {
            const input = document.getElementById('command-input');
            const cmd = input.value;
            if (!cmd) return;

            socket.emit('dispatch_command', {
                target: selectedAgent,
                command: cmd
            });

            // Echo local
            const output = document.getElementById('terminal-output');
            const echo = document.createElement('div');
            echo.style.color = "#555";
            echo.style.marginBottom = "10px";
            echo.innerHTML = `> Sent to ${selectedAgent}: ${cmd}`;
            output.appendChild(echo);
            output.scrollTop = output.scrollHeight;

            input.value = '';
        }

        document.getElementById('command-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });
    </script>
</body>
</html>
