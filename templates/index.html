<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyptia — Precision Network Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:    #0b0c0e;
            --bg-surface: #111316;
            --bg-raised:  #181a1d;
            --bg-hover:   #1e2024;

            --border:     rgba(255,255,255,0.07);
            --border-md:  rgba(255,255,255,0.11);

            --text-primary:   #e8e9ea;
            --text-secondary: rgba(232,233,234,0.50);
            --text-muted:     rgba(232,233,234,0.28);

            --accent:     #4b89dc;
            --accent-dim: rgba(75,137,220,0.12);
            --accent-txt: #7aabee;

            --success:    #3d9e6a;
            --warning:    #c99035;
            --danger:     #c95050;

            --radius-sm:  4px;
            --radius-md:  6px;
            --radius-lg:  8px;

            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--sans);
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── App shell ─────────────────────────────────── */
        .shell {
            display: grid;
            grid-template-rows: 44px 1fr;
            height: 100vh;
        }

        /* ─── Top bar ────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 18px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .topbar-logo {
            font-family: var(--mono);
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.04em;
            color: var(--text-primary);
        }

        .topbar-logo span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .topbar-divider {
            width: 1px;
            height: 16px;
            background: var(--border-md);
        }

        .topbar-label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.idle { background: var(--text-muted); }
        .status-dot.scanning { background: var(--accent); }

        #ts {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* ─── Content ────────────────────────────────────── */
        .content {
            display: grid;
            grid-template-columns: 260px 1fr;
            overflow: hidden;
        }

        /* ─── Sidebar ────────────────────────────────────── */
        .sidebar {
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .agent-list::-webkit-scrollbar { width: 4px; }
        .agent-list::-webkit-scrollbar-track { background: transparent; }
        .agent-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

        .agent-card {
            padding: 9px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.12s;
            border: 1px solid transparent;
        }

        .agent-card:hover {
            background: var(--bg-hover);
        }

        .agent-card.active {
            background: var(--accent-dim);
            border-color: rgba(75,137,220,0.20);
        }

        .agent-card-name {
            font-weight: 500;
            font-size: 12px;
            color: var(--text-primary);
        }

        .agent-card.active .agent-card-name {
            color: var(--accent-txt);
        }

        .agent-card-host {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ─── Main ───────────────────────────────────────── */
        .main {
            display: grid;
            grid-template-rows: 1fr auto;
            overflow: hidden;
            background: var(--bg-base);
        }

        /* ─── Terminal ───────────────────────────────────── */
        .terminal-wrap {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            height: 38px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .terminal-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-process {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .terminal-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 3px;
            background: var(--bg-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-family: var(--mono);
        }

        .terminal-target {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .terminal-target b {
            color: var(--accent-txt);
            font-weight: 500;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px;
            font-family: var(--mono);
            font-size: 12.5px;
            line-height: 1.65;
            color: #c8cdd5;
        }

        #output::-webkit-scrollbar { width: 5px; }
        #output::-webkit-scrollbar-track { background: transparent; }
        #output::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

        .entry {
            padding-bottom: 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .entry:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 10px;
        }

        .entry-ts {
            color: var(--text-muted);
            font-family: var(--mono);
        }

        .entry-label {
            color: var(--accent-txt);
            font-size: 10px;
            letter-spacing: 0.04em;
        }

        .entry-label.boot { color: var(--text-muted); }
        .entry-label.info { color: var(--accent-txt); }
        .entry-label.warn { color: var(--warning); }
        .entry-label.err  { color: var(--danger); }

        .entry-body {
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .entry-body .hl {
            color: var(--accent-txt);
        }

        /* ─── Input bar ──────────────────────────────────── */
        .inputbar {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg-surface);
        }

        .input-prefix {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 10px 0 2px;
            user-select: none;
            flex-shrink: 0;
        }

        #cmd {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-primary);
            caret-color: var(--accent);
        }

        #cmd::placeholder {
            color: var(--text-muted);
            font-size: 12px;
        }

        .btn-scan {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            border: none;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.12s, transform 0.08s;
        }

        .btn-scan:hover { opacity: 0.85; }
        .btn-scan:active { transform: scale(0.97); }
    </style>
</head>
<body>
<div class="shell">

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-logo">Elyptia <span>/ Precision Scanner</span></div>
        <div class="topbar-divider"></div>
        <div class="topbar-label">v14.0</div>
        <div class="topbar-right">
            <div class="status-pill">
                <div class="status-dot" id="dot"></div>
                <span id="conn-label">Ready</span>
            </div>
            <div id="ts">00:00:00</div>
        </div>
    </div>

    <div class="content">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Agents</div>
            </div>
            <div class="agent-list" id="agent-list"></div>
            <div class="sidebar-footer">
                <div class="sidebar-footer-label" id="agent-count">0 agents connected</div>
            </div>
        </div>

        <!-- Main panel -->
        <div class="main">
            <div class="terminal-wrap">
                <div class="terminal-bar">
                    <div class="terminal-bar-left">
                        <span class="terminal-process">network_analysis.exe</span>
                        <span class="terminal-badge">deep-recon</span>
                    </div>
                    <div class="terminal-target">
                        Target: <b id="target-display">none selected</b>
                    </div>
                </div>
                <div id="output">
                    <div class="entry">
                        <div class="entry-meta">
                            <span class="entry-ts" id="boot-ts">--:--:--</span>
                            <span class="entry-label boot">BOOT</span>
                        </div>
                        <div class="entry-body">Elyptia Precision Engine v14.0 initialized.
System ready. Enter target IP or domain to begin analysis.</div>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="inputbar">
                <span class="input-prefix">→</span>
                <input id="cmd" type="text" placeholder="Target IP / domain…" autocomplete="off" spellcheck="false">
                <button class="btn-scan" id="scan-btn">Scan</button>
            </div>
        </div>

    </div>
</div>

<script>
    const socket = io();
    let selectedAgent = 'all';

    /* clock */
    function tick() {
        const t = new Date().toLocaleTimeString('fr-FR', { hour12: false });
        document.getElementById('ts').textContent = t;
        document.getElementById('boot-ts').textContent = t;
    }
    tick(); setInterval(tick, 1000);

    /* log entry */
    function addEntry(body, label = 'INFO') {
        const out = document.getElementById('output');
        const ts  = new Date().toLocaleTimeString('fr-FR', { hour12: false });

        const labelClass = { BOOT:'boot', INFO:'info', WARN:'warn', ERR:'err' }[label] || 'info';

        const highlighted = body.replace(/\[([^\]]+)\]/g,
            '<span class="hl">[$1]</span>');

        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
            <div class="entry-meta">
                <span class="entry-ts">${ts}</span>
                <span class="entry-label ${labelClass}">${label}</span>
            </div>
            <div class="entry-body">${highlighted}</div>`;

        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    /* socket events */
    socket.on('connect', () => {
        document.getElementById('dot').className = 'status-dot';
        document.getElementById('conn-label').textContent = 'Connected';
    });

    socket.on('disconnect', () => {
        document.getElementById('dot').className = 'status-dot idle';
        document.getElementById('conn-label').textContent = 'Disconnected';
    });

    socket.on('update_dashboard', (agents) => {
        const list  = document.getElementById('agent-list');
        const count = Object.keys(agents).length;
        list.innerHTML = '';
        document.getElementById('agent-count').textContent =
            count === 0 ? 'No agents' : `${count} agent${count > 1 ? 's' : ''} connected`;

        for (const id in agents) {
            const card = document.createElement('div');
            card.className = `agent-card${selectedAgent === id ? ' active' : ''}`;
            card.innerHTML = `
                <div class="agent-card-name">${id}</div>
                <div class="agent-card-host">${agents[id].hostname}</div>`;
            card.onclick = () => {
                selectedAgent = id;
                document.getElementById('target-display').textContent = id;
                document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            };
            list.appendChild(card);
            if (selectedAgent === 'all') card.click();
        }
    });

    socket.on('display_response', ({ output }) => addEntry(output));

    /* send */
    function doScan() {
        const input = document.getElementById('cmd');
        const val   = input.value.trim();
        if (!val || !socket.connected) return;
        addEntry(`Initiating precision scan on [${val}]…`, 'INFO');
        socket.emit('dispatch_command', { target: selectedAgent, command: val });
        document.getElementById('dot').className = 'status-dot scanning';
        document.getElementById('conn-label').textContent = 'Scanning…';
        setTimeout(() => {
            document.getElementById('dot').className = 'status-dot';
            document.getElementById('conn-label').textContent = 'Connected';
        }, 3000);
        input.value = '';
    }

    document.getElementById('scan-btn').onclick = doScan;
    document.getElementById('cmd').addEventListener('keydown', e => {
        if (e.key === 'Enter') doScan();
    });
</script>
</body>
</html>
